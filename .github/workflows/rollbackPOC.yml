name: CD with Auto-Revert

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push a revert commit
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy
        id: deploy
        run: |
          set -e
          # Example: kubectl apply -f k8s/ or terraform apply
          ./scripts/deploy.sh

      - name: Auto Revert on Failure
        if: failure()
        env:
          GIT_AUTHOR_NAME: "github-actions[bot]"
          GIT_AUTHOR_EMAIL: "github-actions[bot]@users.noreply.github.com"
          GIT_COMMITTER_NAME: "github-actions[bot]"
          GIT_COMMITTER_EMAIL: "github-actions[bot]@users.noreply.github.com"
        run: |
          echo "Deployment failed; reverting the last commit on main…"
          git revert --no-edit HEAD || (echo "Revert failed" && exit 1)
          git push origin HEAD:main
